<!doctype html>
<html lang="en" data-theme="light" style="user-select: text; -webkit-user-select: text;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josh Hatfield - Principal Cloud Architect</title>

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'josh-dark' : 'josh-light');
      })();
    </script>

    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body style="user-select: text; -webkit-user-select: text;">
    <div id="root" style="user-select: text; -webkit-user-select: text;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
